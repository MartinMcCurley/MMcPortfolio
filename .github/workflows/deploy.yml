name: Deploy Portfolio to GoDaddy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          echo "Build output contents:"
          ls -la out/
          echo "Checking for required files:"
          test -f out/index.html && echo "✓ index.html found" || echo "✗ index.html missing"
          test -f out/.htaccess && echo "✓ .htaccess found" || echo "✗ .htaccess missing"
          test -d out/_next && echo "✓ _next directory found" || echo "✗ _next directory missing"

      - name: Deploy to GoDaddy via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          pass: ${{ secrets.FTP_PASSWORD }}
          localDir: 'out'
          remoteDir: 'public_html'
          options: '--verbose --transfer-all --delete --parallel=10'
          # Clean slate option - USE WITH CAUTION
          # dangerous-clean-slate: true 